name: CI

# Runs on every PR and on pushes to main: server unit tests + client build.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # Surface dependency advisories in the CI log without failing the build.
      # The current server advisories are all transitive/build-time and accepted
      # (see docs/ARCHITECTURE_AND_DEPENDENCIES.md); this keeps them visible so a
      # newly-introduced runtime-reachable issue is noticed on each PR.
      - name: npm audit (informational)
        run: npm audit --omit=dev || true

  client:
    name: Client build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run build
        working-directory: client
