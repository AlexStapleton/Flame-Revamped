name: Build and publish Docker image

# Publishes the image to Docker Hub.
# Triggers:
#   - pushing a version tag like v1.0.0  -> publishes :1.0.0, :1.0 and :latest
#   - manual "Run workflow" button       -> publishes the tag you type (default :latest)
#
# Requires two repository secrets (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token with Read/Write/Delete scope
# See docs/DOCKER_PUBLISH.md for the full setup walkthrough.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. latest or v1.0.0)'
        required: false
        default: 'latest'

env:
  # Docker Hub repository name (created under your DOCKERHUB_USERNAME account).
  IMAGE_NAME: flame-revamped

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Log in BEFORE setting up QEMU. setup-qemu-action pulls
      # tonistiigi/binfmt from Docker Hub; doing it while authenticated avoids
      # the anonymous-pull throttling/timeouts ("context deadline exceeded")
      # that fail the run before we ever reach the build step.
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      # Multi-arch via Dockerfile.multiarch (Debian-based with build tools so the
      # native sqlite3 module compiles for arm64 under QEMU). The earlier v1.2.0
      # failure was a bug in that Dockerfile (it re-declared the automatic
      # BUILDPLATFORM/TARGETPLATFORM args, blanking them) — fixed, and the full
      # arm64 build was validated locally before re-enabling here.
      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .docker/Dockerfile.multiarch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache intentionally left off: a prior failed run wrote an
          # incompatible cache that broke later builds. Builds are fast enough
          # without it, and it avoids that cross-run contamination class of bug.
